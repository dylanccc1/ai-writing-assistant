<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 写作助手 Pro</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1e3a8a; }
        select, textarea, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: #2563eb; color: white; padding: 14px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 5px; }
        button:hover { background: #1d4ed8; }
        #output { margin-top: 20px; padding: 20px; background: #f8fafc; border-radius: 12px; line-height: 1.7; min-height: 200px; position: relative; }
        .copy-btn { position: absolute; top: 10px; right: 10px; background: #64748b; }
    </style>
</head>
<body>
<div class="container">
    <h1>✍️ AI 写作助手 Pro</h1>
    <p style="text-align:center;">输入需求，AI 帮你高效写作</p>

    <select id="model">
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (推荐)</option>
        <option value="mixtral-8x7b-32768">Mixtral 8x7B (逻辑强)</option>
        <option value="gemma2-9b-it">Gemma 2 9B (中文好)</option>
    </select>

    <select id="mode">
        <option value="article">📝 生成文章</option>
        <option value="title">🏷️ 生成标题</option>
        <option value="outline">📋 生成大纲</option>
        <option value="rewrite">✍️ 改写润色</option>
        <option value="continue">🔄 续写</option>
    </select>

    <textarea id="prompt" rows="5" placeholder="请输入写作需求，例如：写一篇关于普通人如何通过AI变现的实用文章..."></textarea>
    
    <input type="text" id="apikey" placeholder="粘贴 Groq API Key (gsk_ 开头)" />
    
    <button onclick="generate()">🚀 开始生成</button>
    
    <div id="output">
        生成结果将显示在这里...
    </div>
</div>

<script>
async function generate() {
    const model = document.getElementById('model').value;
    const mode = document.getElementById('mode').value;
    const userPrompt = document.getElementById('prompt').value.trim();
    const apiKey = document.getElementById('apikey').value.trim();
    const output = document.getElementById('output');
    
    if (!userPrompt) return alert("请输入写作需求！");
    if (!apiKey || !apiKey.startsWith('gsk_')) return alert("请输入正确的 Groq API Key！");

    output.innerHTML = "🤔 AI 正在认真写作中，请稍等...";

    let systemPrompt = "你是一位专业的中文写作大师，文笔优美、结构严谨、内容实用且富有洞见。请根据用户需求高质量完成写作任务。";

    try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: model,
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: userPrompt }
                ],
                temperature: 0.75,
                max_tokens: 4096
            })
        });

        const data = await res.json();
        
        if (data.choices && data.choices[0] && data.choices[0].message) {
            const result = data.choices[0].message.content;
            output.innerHTML = `
                <strong>✅ 生成结果：</strong><br><br>
                ${result.replace(/\n/g, '<br>')}
                <button class="copy-btn" onclick="copyToClipboard('${result.replace(/'/g, "\\'").replace(/\n/g, "\\n")}')">📋 复制</button>
            `;
        } else {
            output.innerHTML = "生成失败：" + (data.error ? data.error.message : "未知错误");
        }
    } catch (e) {
        output.innerHTML = "❌ 生成失败，请检查网络和 API Key。<br>" + e.message;
    }
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        alert("✅ 已复制到剪贴板！");
    });
}
</script>
</body>
</html>
