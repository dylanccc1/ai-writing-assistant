<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 写作助手 Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        :root {
            --bg: #f8fafc;
            --card: white;
            --text: #1e2937;
            --border: #e2e8f0;
        }
        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e2937;
            --text: #e2e8f0;
            --border: #475569;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            color: white;
            padding: 35px 30px;
            text-align: center;
            position: relative;
        }
        .header h1 { margin: 0; font-size: 28px; }
        .header p { margin: 8px 0 0; opacity: 0.9; }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.25);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        .main { padding: 35px; }
        select, textarea, input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--card);
            color: var(--text);
        }
        button {
            background: #2563eb;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin: 6px 4px;
        }
        button:hover { background: #1d4ed8; }
        #output {
            margin-top: 25px;
            padding: 25px;
            background: #f1f5f9;
            border-radius: 16px;
            line-height: 1.8;
            font-size: 16.5px;
            position: relative;
            border: 1px solid var(--border);
            min-height: 220px;
        }
        [data-theme="dark"] #output { background: #334155; }
        .export-btns button { background: #64748b; font-size: 14px; padding: 8px 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✍️ AI 写作助手 Pro</h1>
        <p>Groq 免费高速 · 专业写作</p>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="main">
        <select id="model">
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B（推荐）</option>
            <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
            <option value="gemma2-9b-it">Gemma 2 9B</option>
        </select>

        <select id="mode">
            <option value="article">📝 生成完整文章</option>
            <option value="title">🏷️ 生成标题</option>
            <option value="outline">📋 生成大纲</option>
            <option value="rewrite">✍️ 改写润色</option>
            <option value="continue">🔄 续写</option>
        </select>

        <textarea id="prompt" rows="6" placeholder="输入写作需求..."></textarea>
        
        <input type="text" id="apikey" placeholder="Groq API Key (gsk_ 开头)" />
        
        <div>
            <button onclick="generate()">🚀 开始生成</button>
            <button onclick="clearHistory()">清除历史</button>
        </div>

        <div id="output">生成结果会显示在这里...</div>

        <h3>📜 历史记录（最近10条）</h3>
        <div id="history" class="history"></div>
    </div>
</div>

<script>
// 主题
function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

// 加载主题
if (localStorage.getItem('theme') === 'dark' || window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
}

// 自动保存 Prompt
const promptInput = document.getElementById('prompt');
promptInput.value = localStorage.getItem('lastPrompt') || '';
promptInput.addEventListener('input', () => {
    localStorage.setItem('lastPrompt', promptInput.value);
});

// 历史记录
let history = JSON.parse(localStorage.getItem('aiHistory')) || [];

function saveHistory(prompt, result) {
    history.unshift({ prompt: prompt.substring(0, 60) + '...', result, time: new Date().toLocaleString() });
    if (history.length > 10) history.pop();
    localStorage.setItem('aiHistory', JSON.stringify(history));
    renderHistory();
}

function renderHistory() {
    const container = document.getElementById('history');
    container.innerHTML = history.map((item, i) => `
        <div onclick="loadHistory(${i})" style="padding:12px;background:#f1f5f9;border-radius:10px;margin:8px 0;cursor:pointer;">
            <small>${item.time}</small><br><strong>${item.prompt}</strong>
        </div>
    `).join('');
}

function loadHistory(i) {
    document.getElementById('output').innerHTML = `<strong>历史记录：</strong><br><br>${history[i].result.replace(/\n/g, '<br>')}`;
}

function clearHistory() {
    if (confirm('清除所有历史？')) {
        history = [];
        localStorage.removeItem('aiHistory');
        renderHistory();
    }
}

// 生成
async function generate() {
    const model = document.getElementById('model').value;
    const prompt = document.getElementById('prompt').value.trim();
    const apiKey = document.getElementById('apikey').value.trim();
    const output = document.getElementById('output');

    if (!prompt) return alert("请输入写作需求！");
    if (!apiKey || !apiKey.startsWith('gsk_')) return alert("请输入正确的 Groq API Key！");

    output.innerHTML = "🤔 AI 正在创作，请稍等...";

    try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: model,
                messages: [{ role: "system", content: "专业中文写作大师" }, { role: "user", content: prompt }],
                temperature: 0.75
            })
        });

        const data = await res.json();
        if (data.choices && data.choices[0]) {
            const result = data.choices[0].message.content;
            output.innerHTML = `
                <strong>✅ 生成完成</strong><br><br>
                ${result.replace(/\n/g, '<br>')}
                <div class="export-btns" style="margin-top:20px;">
                    <button onclick="copyText('${result.replace(/'/g,"\\'")}')">📋 复制</button>
                    <button onclick="downloadFile('${result.replace(/'/g,"\\'")}', 'md')">📄 Markdown</button>
                    <button onclick="downloadFile('${result.replace(/'/g,"\\'")}', 'txt')">📝 TXT</button>
                </div>
            `;
            saveHistory(prompt, result);
        } else {
            output.innerHTML = "生成失败";
        }
    } catch (e) {
        output.innerHTML = "网络错误，请检查 Key 和网络";
    }
}

function copyText(text) {
    navigator.clipboard.writeText(text);
    alert("已复制！");
}

function downloadFile(content, type) {
    const blob = new Blob([content], { type: type === 'md' ? 'text/markdown' : 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `写作结果.${type}`;
    a.click();
}

// 初始化
renderHistory();
</script>
</body>
</html>
