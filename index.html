<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 写作助手</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; margin: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        textarea, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 24px; margin: 8px 4px; background: #1890ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #40a9ff; }
        #output { margin-top: 20px; padding: 20px; background: #f6f8fa; border-radius: 8px; white-space: pre-wrap; line-height: 1.7; min-height: 150px; }
    </style>
</head>
<body>
<div class="container">
    <h1>AI 写作助手</h1>
    <textarea id="prompt" rows="8" placeholder="输入写作需求..."></textarea>
    <input type="text" id="apikey" placeholder="Groq API Key (gsk_ 开头)" />
    <div>
        <button onclick="generate()">🚀 生成内容</button>
        <button onclick="copyResult()">📋 复制结果</button>
    </div>
    <div id="output">生成结果会显示在这里...</div>
</div>

<script>
async function generate() {
    const prompt = document.getElementById('prompt').value.trim();
    const apiKey = document.getElementById('apikey').value.trim();
    const output = document.getElementById('output');

    if (!prompt || !apiKey) return alert("请填写完整内容和 Key");

    output.textContent = "生成中，请稍等...";

    try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{ role: "user", content: prompt }],
                temperature: 0.7
            })
        });
        const data = await res.json();
        const result = data.choices[0].message.content;
        output.textContent = result;
    } catch (e) {
        output.textContent = "生成失败：" + e.message;
    }
}

function copyResult() {
    const text = document.getElementById('output').textContent;
    if (text && text !== "生成结果会显示在这里...") {
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ 复制成功！");
        }).catch(() => {
            alert("复制失败，请手动选中文字复制");
        });
    } else {
        alert("没有内容可复制");
    }
}
</script>
</body>
</html>
