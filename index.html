<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 写作助手 - 免费写作神器</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 20px; background: #f8f9fa; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        textarea, select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { background: #0066ff; color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0052cc; }
        #output { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px; white-space: pre-wrap; min-height: 200px; }
    </style>
</head>
<body>
<div class="container">
    <h1>✍️ AI 写作助手</h1>
    <p>输入需求，几秒生成高质量内容</p>

    <select id="mode">
        <option value="article">生成文章</option>
        <option value="title">生成标题</option>
        <option value="outline">生成大纲</option>
        <option value="rewrite">改写润色</option>
        <option value="continue">续写</option>
    </select>

    <textarea id="prompt" rows="6" placeholder="例如：写一篇关于人工智能改变教育的 800 字文章..."></textarea>
    
    <input type="text" id="apikey" placeholder="粘贴你的 API Key（OpenAI / Grok 等）" />
    
    <button onclick="generate()">🚀 开始生成</button>
    
    <div id="output"></div>
</div>

<script>
async function generate() {
    const mode = document.getElementById('mode').value;
    const userPrompt = document.getElementById('prompt').value.trim();
    const apiKey = document.getElementById('apikey').value.trim();
    const output = document.getElementById('output');
    
    if (!userPrompt) return alert("请输入写作需求！");
    if (!apiKey) return alert("请输入 API Key！");

    output.innerHTML = "AI 正在思考中，请稍等...";

    let systemPrompt = "你是一个专业的中文写作助手，文笔优美、逻辑清晰、内容实用。";
    
    if (mode === "title") systemPrompt += "帮我生成吸引人的文章标题。";
    else if (mode === "outline") systemPrompt += "帮我生成详细的大纲。";
    else if (mode === "rewrite") systemPrompt += "帮我润色和改写以下内容，使其更流畅专业。";
    else if (mode === "continue") systemPrompt += "自然续写以下内容。";

    try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",   // 可改成 gpt-4o、grok-beta 等
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: userPrompt }
                ],
                temperature: 0.7
            })
        });

        const data = await res.json();
        output.innerHTML = `<strong>生成结果：</strong><br><br>` + data.choices[0].message.content.replace(/\n/g, '<br>');
    } catch (e) {
        output.innerHTML = "生成失败，请检查 API Key 和网络！<br>" + e.message;
    }
}
</script>
</body>
</html>
