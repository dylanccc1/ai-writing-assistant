<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 写作助手</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 20px; background: #f8f9fa; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        textarea, select, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: #0066ff; color: white; padding: 14px 28px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0052cc; }
        #output { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>
<div class="container">
    <h1>✍️ AI 写作助手</h1>
    <p>输入需求，几秒生成高质量内容（使用 Gemini 免费模型）</p>

    <select id="mode">
        <option value="article">生成文章</option>
        <option value="title">生成标题</option>
        <option value="outline">生成大纲</option>
        <option value="rewrite">改写润色</option>
        <option value="continue">续写</option>
    </select>

    <textarea id="prompt" rows="6" placeholder="例如：写一篇关于人工智能改变教育的 800 字文章..."></textarea>
    
    <input type="text" id="apikey" placeholder="粘贴你的 Gemini API Key（以 AIza 开头）" />
    
    <button onclick="generate()">🚀 开始生成</button>
    
    <div id="output"></div>
</div>

<script>
async function generate() {
    const mode = document.getElementById('mode').value;
    const userPrompt = document.getElementById('prompt').value.trim();
    const apiKey = document.getElementById('apikey').value.trim();
    const output = document.getElementById('output');
    
    if (!userPrompt) return alert("请输入写作需求！");
    if (!apiKey) return alert("请输入 Gemini API Key！");

    output.innerHTML = "AI 正在思考中，请稍等...";

    let system = "你是一个专业的中文写作助手，文笔流畅、结构清晰、内容实用。";

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `${system}\n\n任务：${mode === 'title' ? '生成吸引人的标题' : mode === 'outline' ? '生成详细大纲' : mode === 'rewrite' ? '润色改写以下内容' : mode === 'continue' ? '自然续写以下内容' : '根据以下需求写一篇文章' }\n\n${userPrompt}` }] }]
            })
        });

        const data = await res.json();
        
        if (data.candidates && data.candidates[0]) {
            output.innerHTML = `<strong>生成结果：</strong><br><br>` + 
                data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
        } else {
            output.innerHTML = "生成失败：" + JSON.stringify(data);
        }
    } catch (e) {
        output.innerHTML = "生成失败，请检查 API Key 是否正确，以及网络是否正常。<br>" + e.message;
    }
}
</script>
</body>
</html>
