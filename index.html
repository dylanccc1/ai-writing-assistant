<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 写作助手 Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        :root { --bg: #f8fafc; --card: white; --text: #1e2937; --border: #e2e8f0; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e2937; --text: #e2e8f0; --border: #475569; }
        body { font-family: 'Noto Sans SC', sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 960px; margin: 0 auto; background: var(--card); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: linear-gradient(90deg, #1e40af, #3b82f6); color: white; padding: 35px 30px; text-align: center; position: relative; }
        .header h1 { margin: 0; font-size: 28px; }
        .main { padding: 35px; }
        select, textarea, input { width: 100%; padding: 14px 16px; margin: 12px 0; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; background: var(--card); color: var(--text); }
        button { background: #2563eb; color: white; padding: 14px 28px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600; margin: 6px 4px; }
        button:hover { background: #1d4ed8; }
        .voice-btn { background: #10b981; }
        #output { margin-top: 25px; padding: 25px; background: #f1f5f9; border-radius: 16px; line-height: 1.8; font-size: 16.5px; position: relative; border: 1px solid var(--border); min-height: 220px; }
        [data-theme="dark"] #output { background: #334155; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✍️ AI 写作助手 Pro</h1>
        <p>Groq 免费高速 · 专业写作</p>
        <button onclick="toggleTheme()" style="position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.25);border:none;color:white;padding:10px;border-radius:50%;">🌙</button>
    </div>
    <div class="main">
        <select id="model">
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B（推荐）</option>
            <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
            <option value="gemma2-9b-it">Gemma 2 9B</option>
            <option value="qwen2.5-72b">Qwen2.5 72B（中文强）</option>
        </select>
        <select id="mode">
            <option value="article">📝 生成完整文章</option>
            <option value="title">🏷️ 生成标题</option>
            <option value="outline">📋 生成大纲</option>
            <option value="rewrite">✍️ 改写润色</option>
            <option value="continue">🔄 续写</option>
        </select>
        <div style="position:relative;">
            <textarea id="prompt" rows="6" placeholder="输入需求或点击麦克风说话..."></textarea>
            <button class="voice-btn" onclick="startVoiceInput()" style="position:absolute;bottom:15px;right:15px;padding:10px 14px;">🎤</button>
        </div>
        <input type="text" id="apikey" placeholder="Groq API Key (gsk_ 开头)" />
        <div>
            <button onclick="generate()">🚀 开始生成</button>
            <button onclick="shareLink()">🔗 分享链接</button>
            <button onclick="clearHistory()">清除历史</button>
        </div>
        <div id="output">生成结果会显示在这里...</div>
        <div id="history"></div>
    </div>
</div>

<script>
let historyData = JSON.parse(localStorage.getItem('aiHistory')) || [];

function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'dark' || window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.setAttribute('data-theme', 'dark');
}

const promptEl = document.getElementById('prompt');
promptEl.value = localStorage.getItem('lastPrompt') || '';
promptEl.addEventListener('input', () => localStorage.setItem('lastPrompt', promptEl.value));

function saveHistory(prompt, result) {
    historyData.unshift({ prompt: prompt.substring(0, 60) + '...', result, time: new Date().toLocaleString() });
    if (historyData.length > 10) historyData.pop();
    localStorage.setItem('aiHistory', JSON.stringify(historyData));
    renderHistory();
}
function renderHistory() {
    const container = document.getElementById('history');
    container.innerHTML = historyData.map((item, i) => `
        <div onclick="loadHistory(${i})" style="padding:14px;background:#f8fafc;border-radius:10px;margin:8px 0;cursor:pointer;">
            <small>${item.time}</small><br><strong>${item.prompt}</strong>
        </div>
    `).join('');
}
function loadHistory(i) {
    document.getElementById('output').innerHTML = `<strong>历史记录：</strong><br><br>${historyData[i].result.replace(/\n/g, '<br>')}`;
}
function clearHistory() {
    if (confirm('确定清除所有历史？')) {
        historyData = [];
        localStorage.removeItem('aiHistory');
        renderHistory();
    }
}

function startVoiceInput() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("浏览器不支持语音输入");
    const recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.onresult = (e) => document.getElementById('prompt').value += " " + e.results[0][0].transcript;
    recognition.start();
}

async function generate() {
    const model = document.getElementById('model').value;
    const prompt = document.getElementById('prompt').value.trim();
    const apiKey = document.getElementById('apikey').value.trim();
    const output = document.getElementById('output');

    if (!prompt) return alert("请输入写作需求！");
    if (!apiKey || !apiKey.startsWith('gsk_')) return alert("请输入正确的 Groq API Key！");

    output.innerHTML = "🤔 AI 正在创作中...";

    try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: model,
                messages: [{ role: "system", content: "你是一位专业的中文写作大师" }, { role: "user", content: prompt }],
                temperature: 0.75
            })
        });
        const data = await res.json();
        if (data.choices && data.choices[0]) {
            const result = data.choices[0].message.content;
            output.innerHTML = `
                <strong>✅ 生成完成</strong><br><br>
                ${result.replace(/\n/g, '<br>')}
                <div style="margin-top:20px;">
                    <button onclick="copyText('${result.replace(/'/g,"\\'")}')">📋 复制</button>
                    <button onclick="downloadFile('${result.replace(/'/g,"\\'")}', 'md')">📄 Markdown</button>
                    <button onclick="downloadFile('${result.replace(/'/g,"\\'")}', 'txt')">📝 TXT</button>
                    <button onclick="downloadWord('${result.replace(/'/g,"\\'")}')">📘 Word</button>
                </div>
            `;
            saveHistory(prompt, result);
        } else {
            output.innerHTML = "生成失败";
        }
    } catch (e) {
        output.innerHTML = "网络错误，请检查 Key";
    }
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => alert("✅ 已复制！"));
}

function downloadFile(content, type) {
    const blob = new Blob([content], { type: type === 'md' ? 'text/markdown' : 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `AI写作.${type}`;
    a.click();
}

function downloadWord(content) {
    const html = `<html><head><meta charset="utf-8"><title>AI写作</title></head><body>${content.replace(/\n/g, '<br>')}</body></html>`;
    const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'AI写作结果.doc';
    a.click();
}

function shareLink() {
    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) return alert("请先输入内容");
    const url = `${window.location.origin}${window.location.pathname}?prompt=${encodeURIComponent(prompt)}`;
    navigator.clipboard.writeText(url);
    alert("分享链接已复制！");
}

window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const shared = params.get('prompt');
    if (shared) document.getElementById('prompt').value = decodeURIComponent(shared);
    renderHistory();
};
</script>
</body>
</html>
