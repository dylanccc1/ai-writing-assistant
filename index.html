<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 写作助手 - Groq</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 20px; background: #f8f9fa; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        , ,  { width100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }     
        button { background: #0066ff; color: white; padding: 14px 28px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0052cc; }
        #output { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px; white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body>
<div class="container">
    <h1>✍️ AI 写作助手（Groq 免费高速）</h1>
    <p>输入需求，几秒生成高质量内容</p>

    <select id="mode">
        <option value="article">生成文章</option>
        <option value="title">生成标题</option>
        <option value="outline">生成大纲</option>
        < 值="重写">改写润色</选项>
        <选项 值="继续">续写</选项>
    </选择>

    <textarea id="prompt" rows="6" placeholder="例如：写一篇关于人工智能改变教育的 800 字文章..."></textarea>
    
    <input type="text" id="apikey" placeholder="粘贴你的 Groq API Key (以 gsk_ 开头)" />
    
    <button onclick="generate()">🚀 开始生成</button>
    
    <div id="output"></div>
</div>

<script>
async function generate() {
    常量 文档.通过ID获取元素('模式').值;
    常量 用户提示 = 文档.通过ID获取元素('提示').值.修剪();
    常量 apiKey = 文档.通过ID获取元素('apikey').值.修剪()
    const output = document.getElementById('output');
    
    if (!userPrompt) return alert("请输入写作需求！");
    if (!apiKey || !apiKey.startsWith('gsk_')) return alert("请输入正确的 Groq API Key！");

    output.innerHTML = "AI 正在思考中...";

    try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: "mixtral-8x7b-32768",
                messages: [
                    { role: "system", content: "你是一个专业的中文写作助手，文笔优美、逻辑清晰、内容实用。" },
                    { role: "user", content: userPrompt }
                ],
                temperature: 0.7
            })
        });

        const data = await res.json();
        
         (数据选项 && 数据.选项[0] && 数据.选项[0].消息) {
            output.innerHTML = `<strong>✅ 生成结果：</strong><br><br>` + 
                data.choices[0].message.content.replace(/\n/g, '<br>');
        } else {
            output.innerHTML = "生成失败：" + (data.error ? data.error.message : JSON.stringify(data));
        }
    } catch (e) {
        output.innerHTML = "生成失败，请检查网络和 API Key 是否正确。<br>" + e.message;
    }
}
</script>
</body>
</html>
